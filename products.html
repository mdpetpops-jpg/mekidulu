<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | Mekidulu</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; } .no-scrollbar::-webkit-scrollbar { display: none; }</style>
</head>
<body class="bg-[#FCFAF7] p-6 text-slate-900">
    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-16">
        <a href="index.html"><img src="img/logo.png" class="h-8"></a>
        <a href="index.html" class="text-sm font-bold text-orange-600 underline">Back to Home</a>
    </nav>

    <main class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-black mb-12">Global Best Sellers</h1>
        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </main>

    <div id="productModal" class="fixed inset-0 z-[100] bg-black/90 hidden items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-5xl max-h-[90vh] rounded-[40px] overflow-hidden flex flex-col md:flex-row relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-10 bg-slate-100 p-2 rounded-full hover:bg-white transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            <div class="md:w-3/5 bg-slate-50 h-72 md:h-auto relative" id="modalMedia"></div>
            <div class="md:w-2/5 p-8 md:p-12 overflow-y-auto flex flex-col">
                <div id="modalTag" class="text-[10px] font-bold uppercase tracking-widest text-orange-600 mb-2"></div>
                <h2 id="modalTitle" class="text-2xl font-bold mb-4"></h2>
                <div id="modalPrice" class="text-3xl font-light mb-6 text-orange-600"></div>
                <ul id="modalFeatures" class="text-sm text-slate-600 space-y-3 mb-8 list-none"></ul>
                <div class="mt-auto pt-6 border-t"><a id="walmartLink" href="#" target="_blank" class="block w-full bg-[#0071dc] text-white text-center py-4 rounded-xl font-bold hover:bg-[#005fb8] shadow-lg">Buy on Walmart</a></div>
            </div>
        </div>
    </div>

    <script>
        let productsData = [];
        const ADD_PRICE = 15.00;

        async function init() {
            const res = await fetch('products.json');
            productsData = await res.json();
            renderGrid(productsData);
        }

        function renderGrid(products) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="bg-white p-6 rounded-[32px] shadow-sm hover:shadow-2xl transition-all duration-500 cursor-pointer group" onclick="openModal('${p.id}')">
                    <div class="relative aspect-square overflow-hidden rounded-2xl bg-slate-50 mb-6">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                    </div>
                    <div class="px-2">
                        <h3 class="font-bold text-xl mb-2 group-hover:text-orange-600 transition">${p.name}</h3>
                        <p class="text-2xl font-light text-slate-900 mb-4">$${(parseFloat(p.basePrice) + ADD_PRICE).toFixed(2)}</p>
                        <span class="inline-block w-full bg-slate-900 text-white py-3 rounded-xl text-center text-xs font-bold group-hover:bg-orange-600 transition">View Details</span>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = productsData.find(item => item.id === id);
            if(!p) return;
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalPrice').innerText = "$" + (parseFloat(p.basePrice) + ADD_PRICE).toFixed(2);
            document.getElementById('modalTag').innerText = p.tag || "Mekidulu Original";
            document.getElementById('walmartLink').href = p.walmart;
            let mediaHtml = `<img src="${p.img}" class="w-full h-full object-cover" id="mainModalImg">`;
            if (p.gallery) {
                mediaHtml += `<div class="absolute bottom-4 left-4 right-4 flex space-x-2 overflow-x-auto p-2 bg-black/20 backdrop-blur-md rounded-xl no-scrollbar">
                    ${p.gallery.map(g => `<img src="${g}" onclick="event.stopPropagation(); document.getElementById('mainModalImg').src='${g}'" class="w-12 h-12 object-cover rounded-lg cursor-pointer border-2 border-transparent hover:border-white shrink-0">`).join('')}
                </div>`;
            }
            document.getElementById('modalMedia').innerHTML = mediaHtml;
            document.getElementById('modalFeatures').innerHTML = p.features.map(f => `<li class="flex items-start"><span class="text-orange-500 mr-2">✦</span> ${f}</li>`).join('');
            document.getElementById('productModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        window.onclick = e => { if(e.target == document.getElementById('productModal')) closeModal(); }
        init();
    </script>
</body>
</html>
