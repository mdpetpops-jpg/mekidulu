<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal | Mekidulu Wood Cat Tree Insights</title>
    <meta name="description" id="metaDescription" content="Discover professional insights on wood cat trees, feline wellness, and pet furniture design trends.">
    <link rel="icon" type="image/png" href="img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FCFAF7; }
        #postContent { height: auto !important; min-height: 400px; display: block !important; visibility: visible !important; overflow: visible !important; }
        .blog-content section { display: block !important; margin-bottom: 2rem; }
        .blog-content p { margin-bottom: 2rem; line-height: 1.9; color: #334155; font-size: 1.1rem; }
        .blog-content h2 { font-size: 1.8rem; font-weight: 800; margin: 3rem 0 1.5rem; color: #0f172a; font-style: italic; }
        .blog-content h3 { font-size: 1.4rem; font-weight: 700; margin: 2rem 0 1rem; color: #1e293b; }
        .blog-content strong { color: #0f172a; font-weight: 800; }
        .blog-content img { border-radius: 32px; margin: 3rem auto; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 100%; }
        .blog-content blockquote { border-left: 4px solid #ea580c; padding: 1.5rem 2rem; margin: 2.5rem 0; background: #fff; border-radius: 0 24px 24px 0; font-style: italic; color: #475569; }
        .blog-content a { color: #ea580c; font-weight: 700; text-decoration: underline; text-underline-offset: 4px; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-slate-900">
    <nav class="fixed w-full z-50 py-4 px-6 md:px-10 flex justify-between items-center glass-nav">
        <a href="index.html" class="hover:opacity-80 transition"><img src="img/logo.png" alt="Mekidulu" class="h-8 md:h-10"></a>
        <div class="flex space-x-6 text-sm font-bold items-center">
            <a href="index.html" class="hover:text-orange-600 transition">Home</a>
            <a href="https://tally.so/r/D4XBBj" target="_blank" class="bg-orange-600 text-white px-6 py-2 rounded-full hover:bg-slate-900 transition shadow-lg">Inquiry</a>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-6">
        <article class="max-w-4xl mx-auto">
            <header class="mb-12 text-center">
                <span id="postCategory" class="text-orange-600 font-extrabold text-xs uppercase tracking-[0.3em] mb-6 block">Journal</span>
                <h1 id="postTitle" class="text-4xl md:text-6xl font-extrabold text-slate-900 leading-tight mb-8 tracking-tighter">Loading...</h1>
                <div class="flex items-center justify-center space-x-6 text-slate-400 text-xs font-bold uppercase tracking-widest">
                    <span id="postDate">2026</span>
                    <span class="w-1 h-1 bg-slate-300 rounded-full"></span>
                    <span>Industry Insights</span>
                </div>
            </header>

            <div id="postCover" class="mb-16 rounded-[40px] overflow-hidden shadow-2xl aspect-[16/9] bg-slate-100"></div>

            <div id="postContent" class="blog-content">
                <div class="flex flex-col items-center py-20">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-orange-600 mb-4"></div>
                    <p class="text-slate-400 text-sm italic">Fetching the latest journal...</p>
                </div>
            </div>

            <footer class="mt-24 pt-16 border-t border-slate-200">
                <div class="bg-slate-950 rounded-[48px] p-12 text-center text-white shadow-2xl">
                    <h4 class="text-3xl font-extrabold mb-6 italic tracking-tight">Ready to Elevate Your Retail Space?</h4>
                    <div class="flex flex-col md:flex-row justify-center gap-6">
                        <a href="index.html" class="bg-white text-slate-950 px-10 py-4 rounded-2xl font-black">View More</a>
                        <a href="https://tally.so/r/D4XBBj" target="_blank" class="bg-orange-600 text-white px-10 py-4 rounded-2xl font-black">Custom Inquiry</a>
                    </div>
                </div>
                <div class="mt-16 text-center">
                    <a href="index.html" class="text-slate-400 hover:text-orange-600 transition font-black text-sm uppercase tracking-widest">← Back to Brand Home</a>
                </div>
            </footer>
        </article>
    </main>

<script>
    (async function() {
        const contentContainer = document.getElementById('postContent');
        const titleEl = document.getElementById('postTitle');
        const postCover = document.getElementById('postCover'); // 顶部大图容器
        
        try {
            const res = await fetch('blog.json?v=' + new Date().getTime());
            if (!res.ok) throw new Error("JSON not found");
            const blogs = await res.json();

            const urlParams = new URLSearchParams(window.location.search);
            const blogId = urlParams.get('id');

            if (blogId) {
                // ================= 博客详情页 (保持现状，不动) =================
                const post = blogs.find(b => String(b.id) === String(blogId));
                if (post) {
                    if(postCover) postCover.style.display = 'block'; // 详情页确保显示大图
                    document.title = `${post.title} | Mekidulu Journal`;
                    titleEl.innerText = post.title;
                    document.getElementById('postCategory').innerText = post.category || "Insight";
                    document.getElementById('postDate').innerText = post.date || "2026";
                    if(postCover) postCover.innerHTML = `<img src="${post.cover_img}" class="w-full h-full object-cover">`;
                    contentContainer.innerHTML = post.content;
                }
            } else {
                // ================= 列表展示页 (精准优化) =================
                // 1. 强制隐藏顶部的那个大空图容器
                if(postCover) postCover.style.display = 'none'; 
                
                titleEl.innerText = "Mekidulu Journal";
                
                // 2. 渲染博客集合：小头图 + 标题
                contentContainer.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mt-10">
                        ${blogs.map(b => `
                            <a href="blog.html?id=${b.id}" class="group block bg-white p-6 rounded-[40px] border border-slate-100 hover:shadow-2xl transition-all duration-500">
                                <div class="aspect-video overflow-hidden rounded-[24px] mb-6 bg-slate-50">
                                    <img src="${b.cover_img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" onerror="this.src='img/logo.png'">
                                </div>
                                <div class="px-2">
                                    <h3 class="text-2xl font-black italic uppercase leading-tight group-hover:text-orange-600 transition tracking-tighter">${b.title}</h3>
                                    <p class="text-slate-400 mt-4 text-sm line-clamp-2 italic">${b.summary || ''}</p>
                                    <div class="mt-6 flex items-center text-orange-600 font-bold text-xs uppercase tracking-widest">
                                        Read Article 
                                        <span class="ml-2 group-hover:ml-4 transition-all">→</span>
                                    </div>
                                </div>
                            </a>
                        `).join('')}
                    </div>
                `;
            }
        } catch (e) {
            console.error(e);
            if(postCover) postCover.style.display = 'none';
            contentContainer.innerHTML = "<p class='text-center text-red-500'>Connection lost. Please check blog.json.</p>";
        }
    })();
</script>
</body>
</html>
