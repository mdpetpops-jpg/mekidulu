<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mekidulu | Designed for Modern Cat Living</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#FCFAF7] text-slate-900">
    <nav class="fixed w-full z-50 py-4 px-6 md:px-10 flex justify-between items-center bg-white/90 backdrop-blur-md border-b border-slate-100">
        <a href="index.html"><img src="img/logo.png" alt="Mekidulu" class="h-8 md:h-10"></a>
        <div class="hidden md:flex space-x-8 text-sm font-bold items-center">
            <a href="products.html" class="hover:text-orange-600 transition">Collections</a>
            <a href="catalog.html" class="hover:text-orange-600 transition">B2B Catalog</a>
            <a href="https://tally.so/r/D4XBBj" target="_blank" class="bg-orange-600 text-white px-6 py-2 rounded-full hover:bg-orange-700 shadow-lg transition">Inquiry</a>
        </div>
    </nav>

    <section class="relative pt-28 pb-12 px-6">
        <div class="max-w-7xl mx-auto rounded-[40px] overflow-hidden aspect-[21/9] relative shadow-2xl bg-slate-200">
            <img src="img/hero-banner.png" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/30 flex items-center px-12 text-white">
                <div class="max-w-xl">
                    <h1 class="text-4xl md:text-6xl font-extrabold mb-4 leading-tight">Designed for Homes, <span class="text-orange-400">Loved by Cats.</span></h1>
                    <p class="text-lg opacity-90 mb-8 font-medium">Global best-sellers now available with direct factory value.</p>
                    <a href="products.html" class="bg-white text-black px-8 py-3 rounded-xl font-bold hover:bg-orange-600 hover:text-white transition">Shop Now</a>
                </div>
            </div>
        </div>
    </section>

    <section id="products" class="py-20 px-6 max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-12">
            <h2 class="text-3xl font-extrabold tracking-tight">Flagship Collection</h2>
            <a href="products.html" class="text-orange-600 font-bold border-b-2 border-orange-600 pb-1">View All →</a>
        </div>
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </section>

    <div id="productModal" class="fixed inset-0 z-[100] bg-black/90 hidden items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-5xl max-h-[90vh] rounded-[40px] overflow-hidden flex flex-col md:flex-row relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-10 bg-slate-100 p-2 rounded-full hover:bg-white transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            <div class="md:w-3/5 bg-slate-50 h-72 md:h-auto relative" id="modalMedia"></div>
            <div class="md:w-2/5 p-8 md:p-12 overflow-y-auto flex flex-col">
                <div id="modalTag" class="text-[10px] font-bold uppercase tracking-widest text-orange-600 mb-2"></div>
                <h2 id="modalTitle" class="text-2xl font-bold mb-4"></h2>
                <div id="modalPrice" class="text-3xl font-light mb-6 text-orange-600"></div>
                <ul id="modalFeatures" class="text-sm text-slate-600 space-y-3 mb-8 list-none"></ul>
                <div class="mt-auto"><a id="walmartLink" href="#" target="_blank" class="block w-full bg-[#0071dc] text-white text-center py-4 rounded-xl font-bold hover:bg-[#005fb8] shadow-lg">Buy on Walmart</a></div>
            </div>
        </div>
    </div>

    <script>
        let productsData = [];
        const ADD_PRICE = 15.00; // 核心：统一加价规则

        async function init() {
            const res = await fetch('products.json');
            productsData = await res.json();
            const grid = document.getElementById('productGrid');
            grid.innerHTML = productsData.slice(0, 3).map(p => `
                <div class="group cursor-pointer bg-white p-4 rounded-[32px] shadow-sm hover:shadow-xl transition-all duration-500" onclick="openModal('${p.id}')">
                    <div class="relative aspect-square overflow-hidden rounded-[24px] bg-slate-50">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                    </div>
                    <div class="mt-6 px-2">
                        <h3 class="font-bold text-lg leading-tight group-hover:text-orange-600 transition">${p.name}</h3>
                        <p class="text-slate-400 mt-2 font-medium">$${(parseFloat(p.basePrice) + ADD_PRICE).toFixed(2)}</p>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = productsData.find(item => item.id === id);
            if(!p) return;
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalPrice').innerText = "$" + (parseFloat(p.basePrice) + ADD_PRICE).toFixed(2);
            document.getElementById('modalTag').innerText = p.tag || "Mekidulu Original";
            document.getElementById('walmartLink').href = p.walmart;
            let mediaHtml = `<img src="${p.img}" class="w-full h-full object-cover" id="mainModalImg">`;
            if (p.gallery) {
                mediaHtml += `<div class="absolute bottom-4 left-4 right-4 flex space-x-2 overflow-x-auto p-2 bg-black/20 backdrop-blur-md rounded-xl no-scrollbar">
                    ${p.gallery.map(g => `<img src="${g}" onclick="event.stopPropagation(); document.getElementById('mainModalImg').src='${g}'" class="w-12 h-12 object-cover rounded-lg cursor-pointer border-2 border-transparent hover:border-white shrink-0">`).join('')}
                </div>`;
            }
            document.getElementById('modalMedia').innerHTML = mediaHtml;
            document.getElementById('modalFeatures').innerHTML = p.features.map(f => `<li class="flex items-start"><span class="text-orange-500 mr-2">✦</span> ${f}</li>`).join('');
            document.getElementById('productModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        window.onclick = e => { if(e.target == document.getElementById('productModal')) closeModal(); }
        init();
    </script>
</body>
</html>
